<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURNEY - Missed Connection</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .ending-ignore-bg {
            background: linear-gradient(135deg, #2C2C3A 0%, #1A1A2E 100%);
        }
        .ending-ignore-content {
            text-align: center;
            padding: 48px;
        }
        .ending-ignore-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.7;
        }
    </style>
</head>
<body class="ending-ignore-bg">
    <div id="game-container">
        <div class="ending-screen">
            <div class="ending-ignore-content">
                <div class="ending-ignore-icon">🌙</div>
                <h1 class="game-title" style="font-size: 48px;">Missed Connection</h1>
                <p class="game-subtitle" style="margin-bottom: 32px;">
                    Some connections are missed chances.
                </p>
                <p style="color: var(--color-text-muted); margin-bottom: 48px; max-width: 500px; margin-left: auto; margin-right: auto;">
                    You decided not to reply. The notification sat there... then got buried under other messages.<br>
                    Days passed. He didn't message again—he respects the silence.<br>
                    Sometimes friendships that could have been just... drift away like dandelion seeds.
                </p>
                <button onclick="window.location.href='../index.html'" class="title-button">Try a Different Path</button>
                <button onclick="window.location.href='../index.html'" class="title-button secondary" style="margin-top: 16px;">Return to Title</button>
            </div>
        </div>
    </div>
</body>
</html>
